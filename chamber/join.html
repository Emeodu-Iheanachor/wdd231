<main class="join-container">

<form id="joinForm" method="get" action="thankyou.html">

  <h2>Membership Application</h2>

  <!-- NAME -->
  <label for="fname">First Name</label>
  <input id="fname" name="fname" required
    title="Enter your first name"
    autocomplete="given-name">

  <label for="lname">Last Name</label>
  <input id="lname" name="lname" required
    title="Enter your last name"
    autocomplete="family-name">

  <!-- TITLE -->
  <label for="orgtitle">Organizational Title</label>
  <input id="orgtitle" name="orgtitle"
    pattern="[A-Za-z\\-\\s]{7,}"
    title="Minimum 7 characters: letters, spaces, hyphens only">

  <!-- EMAIL -->
  <label for="email">Email</label>
  <input id="email" type="email" name="email" required
    title="Enter a valid email address (example@email.com)"
    autocomplete="email">

  <!-- PHONE -->
  <label for="phone">Phone</label>
  <input id="phone" type="tel" name="phone" required
    title="Enter valid Nigerian number (08012345678 or +2348012345678)"
    autocomplete="tel">

  <!-- ORG -->
  <label for="organization">Organization Name</label>
  <input id="organization" name="organization" required
    title="Enter your organization name">

  <!-- MEMBERSHIP -->
  <label for="membership">Membership Level</label>
  <select id="membership" name="membership" required
    title="Select a membership level">
    <option value="">Select Level</option>
    <option value="NP">NP Membership</option>
    <option value="Bronze">Bronze</option>
    <option value="Silver">Silver</option>
    <option value="Gold">Gold</option>
  </select>

  <!-- DESCRIPTION -->
  <label for="description">Business Description</label>
  <textarea id="description" name="description"
    title="Describe your business"></textarea>

  <input type="hidden" id="timestamp" name="timestamp">

  <button type="submit">Apply</button>
</form>

</main>
